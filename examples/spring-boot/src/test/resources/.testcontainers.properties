# Testcontainers Configuration
# This file configures Testcontainers behavior for integration tests

# Enable container reuse for faster test iterations during development
# When enabled, containers are kept running between test runs
# Set to true for development, false for CI/CD environments
# Default: false
testcontainers.reuse.enable=false

# Ryuk container configuration
# Ryuk is responsible for cleaning up containers after tests
# Disable only if you have issues with Ryuk in your environment
# Default: false
testcontainers.ryuk.disabled=false
