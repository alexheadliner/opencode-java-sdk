# OpenCode Server Docker Compose Configuration
#
# Required Environment Variables:
#   Z_AI_API_KEY              - Your Z.AI API key for AI provider authentication
#   OPENCODE_SERVER_USERNAME  - Username for HTTP Basic Auth (default: opencode)
#   OPENCODE_SERVER_PASSWORD  - Password for HTTP Basic Auth (default: opencode123)
#
# Optional Environment Variables:
#   OPENCODE_SERVER_PORT      - Server port (default: 4096)
#   OPENCODE_SERVER_HOST      - Server host binding (default: 0.0.0.0)
#
# Configuration Methods:
#   1. Create a .env.opencode file based on .env.opencode.example
#   2. Pass variables via command line: Z_AI_API_KEY=xxx docker-compose up
#   3. Export variables in your shell before running docker-compose
#
# Note: The .env.opencode file is loaded via env_file. Do not commit sensitive values to git.

version: '3.8'

services:
  opencode-server:
    build:
      context: .
    container_name: opencode-server
    ports:
      - "${OPENCODE_SERVER_PORT:-4096}:${OPENCODE_SERVER_PORT:-4096}"
    env_file:
      # Users should create their own .env.opencode file based on .env.opencode.example
      - .env.opencode
    environment:
      # Required variables - must be provided via .env.opencode or environment
      Z_AI_API_KEY: ${Z_AI_API_KEY}
      OPENCODE_SERVER_USERNAME: ${OPENCODE_SERVER_USERNAME:-opencode}
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:-opencode123}
      # Optional variables with defaults
      OPENCODE_SERVER_PORT: ${OPENCODE_SERVER_PORT:-4096}
      OPENCODE_SERVER_HOST: ${OPENCODE_SERVER_HOST:-0.0.0.0}
    volumes:
      - opencode-data:/root/.local/share/opencode
      - opencode-config:/root/.config/opencode
    networks:
      - opencode-sdk
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:${OPENCODE_SERVER_PORT:-4096}/global/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3

volumes:
  opencode-data:
  opencode-config:

networks:
  opencode-sdk:
    driver: bridge
